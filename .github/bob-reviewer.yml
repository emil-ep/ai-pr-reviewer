# Bob PR Reviewer Configuration

review:
  # Automatically review PRs when opened or updated
  auto_review: true
  
  # Maximum number of files to review (cost control)
  max_files: 20
  
  # Maximum file size to review (in KB)
  max_file_size: 500
  
  # File patterns to ignore
  ignore_patterns:
    - "*.md"
    - "*.json"
    - "*.lock"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "*.min.js"
    - "*.min.css"
    - "dist/**"
    - "build/**"
    - "node_modules/**"
  
  # Languages to review (empty = all)
  languages:
    - javascript
    - typescript
    - python
    - go
    - rust
    - java
    - cpp
    - c
  
  # Review focus areas
  focus:
    - security        # Security vulnerabilities
    - logic           # Logic errors and bugs
    - performance     # Performance issues
    - best_practices  # Code quality and standards
    - testing         # Test coverage suggestions
    - documentation   # Documentation improvements
  
  # Comment settings
  comments:
    # Minimum severity to post (critical|warning|suggestion)
    min_severity: suggestion
    
    # Post summary comment
    post_summary: true
    
    # Post inline comments on specific lines
    post_inline: true
    
    # Maximum comments per file
    max_per_file: 10
    
    # Maximum total comments per PR
    max_total: 50

# Bob (Claude) configuration
bob:
  # Claude model to use
  model: claude-3-5-sonnet-20241022
  
  # Maximum tokens for analysis
  max_tokens: 4096
  
  # Temperature for responses (0.0-1.0)
  temperature: 0.3
  
  # System prompt customization (optional)
  # custom_prompt: |
  #   You are a senior code reviewer...

# GitHub settings
github:
  # Post as review or individual comments
  review_type: review  # review|comments
  
  # Review event type (only for review_type: review)
  event: COMMENT  # APPROVE|REQUEST_CHANGES|COMMENT
  
  # Add labels based on review
  auto_label: true
  labels:
    needs_work: "needs-work"
    looks_good: "looks-good"
    security_issue: "security"

