name: Bob PR Review

on:
  pull_request:
    # opened      → initial review (round 1)
    # synchronize → developer pushed new commits; triggers follow-up review
    # reopened    → treat like a fresh open
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  # One review run per PR at a time. On rapid pushes the older run is cancelled
  # before it reaches the (expensive) AI call, saving API quota.
  group: pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Run on PR events OR when a user posts /review in a PR comment
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/review'))

    permissions:
      contents: read
      pull-requests: write   # required for createReview (Reviews API) and GraphQL thread query
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Resolve PR number and repo
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi
          echo "repo_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT

      - name: Run AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Provider selection — set AI_PROVIDER secret to one of:
          # bob | chatgpt | claude | grok
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}

          # Bob
          BOB_API_ENDPOINT: ${{ secrets.BOB_API_ENDPOINT }}

          # ChatGPT
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ secrets.OPENAI_MODEL }}

          # Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}

          # Grok
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL:   ${{ secrets.GROK_MODEL }}

          PR_NUMBER:  ${{ steps.pr.outputs.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME:  ${{ steps.pr.outputs.repo_name }}
        run: |
          echo "🤖 Reviewing PR #${PR_NUMBER} in ${REPO_OWNER}/${REPO_NAME}"
          echo "Using AI Provider: ${AI_PROVIDER:-grok}"
          node dist/index.js
